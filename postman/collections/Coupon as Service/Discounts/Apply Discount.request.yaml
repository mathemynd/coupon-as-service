$kind: http-request
name: 'Apply Discount (Create)'
method: POST
url: '{{baseUrl}}/api/discounts'
order: 4000
queryParams:
  - key: password
    value: '{{password}}'
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "code": "SAVE20",
      "user": "user123"
    }
description: 'Apply a coupon to a user. Upserts by user+code combination. The coupon must exist. Creates a discount record with start/end dates based on coupon duration.'
