$kind: http-request
name: Create Email-Based Coupon
method: POST
url: '{{baseUrl}}/api/coupons'
order: 4000
queryParams:
  - key: password
    value: '{{password}}'
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "email": "mit.edu",
      "percent_off": 15,
      "duration": "forever"
    }
description: 'Create a coupon tied to an email domain. Retrieve it using `GET /api/coupons/@mit.edu`.'
